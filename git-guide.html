<!DOCTYPE html>
<html lang="fr" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Git Reference — Grands Projets</title>
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml"/>
  <!-- Polices : Syne (display) · DM Sans (UI) · Source Code Pro (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-top">

      <div class="logo-wrap">
        <div class="logo-icon">G</div>
        <div>
          <div class="logo-title">Git Reference</div>
          <div class="logo-sub">Grands Projets &mdash; Guide Expert</div>
        </div>
      </div>

      <div class="header-right">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="search" type="text" placeholder="Rechercher une commande..." autocomplete="off"/>
          <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
        </div>

        <!-- THEME SWITCHER -->
        <div class="theme-switcher">
          <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleThemePanel()" title="Changer le thème">
            <span class="theme-toggle-ring"></span>
            <span class="theme-toggle-dot" id="themeToggleDot"></span>
          </button>
          <div class="theme-panel" id="themePanel">
            <div class="theme-panel-title">Thème</div>
            <div class="theme-swatches" id="themeSwatches"></div>
          </div>
        </div>
      </div>

    </div>
  </header>

  <!-- LAYOUT -->
  <div class="layout">
    <aside id="sidebar"></aside>
    <main id="main"></main>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <span class="footer-label">Git Reference &mdash; Grands Projets</span>
    </div>
    <div class="footer-branches">
      <span class="footer-branch">main</span>
      <span class="footer-branch">develop</span>
      <span class="footer-branch">feature/X</span>
    </div>
  </footer>
  <script src="scripts/app.js"></script>
</body>
</html>
